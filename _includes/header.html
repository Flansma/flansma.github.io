<header class="header">

        <span class="logo-text">Okuno Lab</span>
        <span class="logo-sub">Kyoto University</span>
      </a>
    </h1>
    <div class="header-actions">
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <span class="material-icons-outlined icon-light">light_mode</span>
        <span class="material-icons-outlined icon-dark">dark_mode</span>

      <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span class="menu-icon"></span>

    <nav class="gnav" id="gnav">
      <ul class="gnav-list">

        <li class="gnav-item"><a href="#skill"><span data-i18n="nav.skill">SKILL</span></a></li>
        <li class="gnav-item"><a href="#contact"><span data-i18n="nav.contact">CONTACT</span></a></li>
      </ul>
      <div class="lang-switch">
        <button type="button" data-lang="en" onclick="setLang('en')">English</button>
        <button type="button" data-lang="ja" onclick="setLang('ja')">日本語</button>
        <button type="button" data-lang="ko" onclick="setLang('ko')">한국어</button>
      </div>
