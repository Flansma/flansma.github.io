{% include meta.html %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page_full_title }}</title>
<meta name="description" content="{{ page_description }}">
<meta name="theme-color" content="#1a1a2e">
<meta name="color-scheme" content="light dark">
<link rel="canonical" href="{{ page_canonical }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} Feed" href="{{ '/feed.xml' | absolute_url }}">
<link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/img/face.png">

<meta property="og:type" content="{{ page_og_type }}">
<meta property="og:title" content="{{ page_full_title }}">
<meta property="og:description" content="{{ page_description }}">
<meta property="og:url" content="{{ page_canonical }}">
<meta property="og:image" content="{{ page_image_url }}">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:creator" content="@flansma">
<meta name="twitter:title" content="{{ page_full_title }}">
<meta name="twitter:description" content="{{ page_description }}">
<meta name="twitter:image" content="{{ page_image_url }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Material+Icons+Outlined" rel="stylesheet">
<link href="{{ site.baseurl }}/assets/css/style.css" media="all" rel="stylesheet" type="text/css">
<script src="{{ site.baseurl }}/assets/js/i18n.js" defer></script>
{% include jsonld.html %}
